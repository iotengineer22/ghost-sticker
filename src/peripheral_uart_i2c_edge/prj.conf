# ==============================================================================
# Basic System Configuration
# ==============================================================================
# Enable C++ language support
CONFIG_CPP=y
# Enable the standard C++ library (Glibcxx/Libc++)
CONFIG_GLIBCXX_LIBCPP=y
# Use Newlib C Library
CONFIG_NEWLIB_LIBC=y
# Enable floating-point formatting support (%f) for printf functions in Newlib
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# Enable the FPU (Floating Point Unit)
CONFIG_FPU=y

# Increase the main thread stack size to 8192 bytes (often needed for ML models)
CONFIG_MAIN_STACK_SIZE=8192

# Enable the UART driver
CONFIG_UART_ASYNC_API=y
CONFIG_NRFX_UARTE=y
CONFIG_SERIAL=y

CONFIG_GPIO=y

# Make sure printk is printing to the UART console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Heap memory pool size for C++ and SDK allocations
CONFIG_HEAP_MEM_POOL_SIZE=32768

# ==============================================================================
# BLE NUS Configuration
# ==============================================================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Nordic_UART_Service"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# Enable the NUS service
CONFIG_BT_NUS=y

# Enable bonding
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# Enable DK LED and Buttons library
CONFIG_DK_LIBRARY=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ==============================================================================
# Logging Configuration
# ==============================================================================
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_PRINTK=n

CONFIG_ASSERT=y

# Enable I2C driver
CONFIG_I2C=y

# Enable float formatting support in printf
CONFIG_CBPRINTF_FP_SUPPORT=y

# Increase BLE MTU size for larger packet transmission
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251

# Increase TX buffers to prevent ENOMEM (-12)
CONFIG_BT_CONN_TX_MAX=10
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
